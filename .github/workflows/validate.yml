name: Validate marketplace

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate marketplace contract
        run: |
          set -euo pipefail
          file=.agents/plugins/marketplace.json
          jq -e '
            .name == "jahns-codex-marketplace" and
            (.interface.displayName | type == "string" and length > 0) and
            (.plugins | length == 1) and
            (.plugins[0].name == "waystone") and
            (.plugins[0].source.source == "url") and
            (.plugins[0].source.url == "https://github.com/Dev-Jahn/waystone.git") and
            (.plugins[0].source.sha | test("^[0-9a-f]{40}$")) and
            (.plugins[0].policy.installation == "AVAILABLE") and
            (.plugins[0].policy.authentication == "ON_INSTALL") and
            (.plugins[0].category == "Developer Tools")
          ' "$file" >/dev/null

      - name: Install Codex CLI
        run: npm install --global @openai/codex@0.144.4

      - name: Install Waystone from the marketplace
        run: |
          set -euo pipefail
          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$CODEX_HOME"
          codex plugin marketplace add "$GITHUB_WORKSPACE"
          codex plugin list --marketplace jahns-codex-marketplace --available --json \
            | jq -e '.available[] | select(.name == "waystone")' >/dev/null
          install=$(codex plugin add waystone@jahns-codex-marketplace --json)
          jq -e '
            .name == "waystone" and
            .pluginId == "waystone@jahns-codex-marketplace"
          ' <<<"$install" >/dev/null
          installed_path=$(jq -r .installedPath <<<"$install")
          jq -e '.name == "waystone" and .version == "0.8.3"' \
            "$installed_path/.codex-plugin/plugin.json" >/dev/null
          codex plugin list --marketplace jahns-codex-marketplace --json \
            | jq -e '.installed[] | select(.name == "waystone" and .installed == true)' \
            >/dev/null
